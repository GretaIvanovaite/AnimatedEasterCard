<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"/>
    <title>Preview - Animated Easter Card</title>
</head>
<body>
    <header>
        <h1>Personalised easter card</h1>
    </header>
    <main>
        <h2>Preview your card</h2>
        <section class="card-preview" aria-label="Card preview">
            <p class="card-preview__phrase">Thank you for being our customer!</p>
            <img src="" alt="Easter card illustration" class="card-preview__image">
        </section>
        <form action="sending.html" method="get">
            <div class="buttons">
                <p class="help">Clicking confirm will start sending your cards to all recipients.</p>
                <button type="button" class="back" onclick="history.back()">Back</button>
                <button type="submit" class="next">Confirm</button>
            </div>
        </form>
    </main>
    <footer>
        <small>This is a portfolio project for Edge Hill University Web Portfolio module</small>
    </footer>
</body>
</html>
