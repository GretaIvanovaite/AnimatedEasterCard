<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/layout.css"/>
    <link rel="stylesheet" href="css/styles.css"/>
    <title>Sending — Animated Easter Card</title>
</head>
<body>
    <header>
        <h1>Easter Card Creator</h1>
    </header>
    <main>
        <nav aria-label="Progress steps">
            <ol>
                <li data-status="done">
                    <span>&#x2713;</span>
                    <span>Details</span>
                </li>
                <li data-status="done">
                    <span>&#x2713;</span>
                    <span>Personalise</span>
                </li>
                <li data-status="done">
                    <span>&#x2713;</span>
                    <span>Preview</span>
                </li>
                <li aria-current="step">
                    <span>4</span>
                    <span>Send</span>
                </li>
            </ol>
        </nav>

        <section aria-labelledby="sending-heading">
            <h2 id="sending-heading">Sending your cards</h2>
            <div aria-label="Sending status" aria-live="polite">
                <p id="sending-status">Preparing to send&hellip;</p>

                <div id="progress-container" hidden>
                    <div role="progressbar"
                         aria-valuenow="0"
                         aria-valuemin="0"
                         aria-valuemax="100"
                         id="progress-track">
                        <div id="progress-fill"></div>
                    </div>
                    <p id="progress-label"></p>
                </div>

                <ul id="sending-results"></ul>
            </div>
        </section>

    </main>
    <footer>
        <small>Portfolio project - Edge Hill University CIS3413 Advanced Web Portfolio</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/sending.js"></script>
</body>
</html>
