<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"/>
    <title>Sending - Animated Easter Card</title>
</head>
<body>
    <header>
        <h1>Personalised easter card</h1>
    </header>
    <main>

            <p id="sending-status">Preparing to send...</p>

    </main>
    <footer>
        <small>This is a portfolio project for Edge Hill University Web Portfolio module</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="sending.js"></script>
</body>
</html>
